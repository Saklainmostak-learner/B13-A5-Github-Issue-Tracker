<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Git hub Tracker</title>
    <!-- Daisy/css -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <!-- css -->
    <style>
      * {
        font-family: "Geist", sans-serif;
      }
    </style>
  </head>
  <body class="bg-white">
    <header class="p-2 border-none bg-base-200 shadow">
      <div class="max-w-6xl mx-auto px-3 py-2">
        <div
          class="flex flex-col gap-3 md:flex-row md:items-center md:justify-between"
        >
          <!-- logo/text -->
          <div class="flex items-center gap-2">
            <img
              src="./assets/github-logo.png"
              alt="##"
              class="w-7 h-7 object-contain"
            />
            <h1 class="text-2xl font-semibold text-neutral">
              GitHub Issues Tracker
            </h1>
          </div>
          <!-- search/button -->
          <div class="flex flex-col sm:flex-row gap-2 w-full md:w-auto">
            <label
              class="input input-bordered h-9 rounded-md flex items-center gap-2 w-full sm:w-[260px] bg-white"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-4 w-4 opacity-50"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="m21 21-4.35-4.35m1.85-5.15a7 7 0 1 1-14 0 7 7 0 0 1 14 0Z"
                />
              </svg>
              <input
                id="searchInput"
                type="text"
                class="grow text-sm"
                placeholder="Search issues..."
              />
            </label>
            <button
              id="searchBtn"
              class="btn h-9 min-h-9 rounded-md btn-outline"
            >
              Search
            </button>

            <button
              id="newIssueBtn"
              class="btn h-9 min-h-9 rounded-md bg-primary border-none text-white"
            >
              + New Issue
            </button>
          </div>
        </div>
      </div>
    </header>
    <section class="max-w-6xl mx-auto px-3 py-6">
      <div class="border-t-slate-100 bg-base-200 shadow p-3 rounded-md">
        <div class="flex flex-wrap gap-2">
          <button
            id="allTabBtn"
            class="tab-btn btn btn-sm h-8 px-6 rounded-md border-base-300 bg-primary text-white active-tab"
            data-tab="all"
          >
            All
          </button>
          <button
            id="openTabBtn"
            class="tab-btn btn btn-sm min-h-8 h-8 px-6 rounded-md border-base-300 bg-base-100 text-[#64748B]"
            data-tab="open"
          >
            Open
          </button>
          <button
            id="closeTabBtn"
            class="tab-btn btn btn-sm min-h-8 h-8 px-6 rounded-md border-base-300 bg-base-100 text-[#64748B]"
            data-tab="closed"
          >
            Closed
          </button>
        </div>
      </div>
    </section>
    <section class="max-w-6xl mx-auto px-3">
      <div class="border-t-slate-100 bg-base-200 shadow p-4 rounded-md">
        <div class="flex justify-between gap-3">
          <div class="flex gap-3">
            <img
              src="./assets/Aperture.png"
              alt="##"
              class="w-10 h-10 bg-[#4800ff55] rounded-full p-1"
            />
            <div>
              <h2 id="issuesCount" class="font-bold text-neutral text-lg">
                0 Issues
              </h2>
              <p class="text-[#64748B] mt-1 text-sm">
                Track and manage your project issues
              </p>
            </div>
          </div>
          <div class="flex items-center gap-3 text-xs">
            <div class="flex items-center gap-1 text-neutral">
              <span
                class="w-3 h-3 rounded-full bg-green-600 inline-block"
              ></span>
              <span>Open</span>
              <span id="openCount">0</span>
            </div>

            <div class="flex items-center gap-1 text-neutral">
              <span
                class="w-3 h-3 rounded-full bg-violet-600 inline-block"
              ></span>
              <span>Closed</span>
              <span id="closedCount">0</span>
            </div>
          </div>
        </div>
      </div>
    </section>
    <section class="max-w-6xl mx-auto px-3 py-6">
      <!-- cardsection -->
      <div
        id="allIssuesShowing"
        class="grid lg:grid-cols-4 sm:grid-cols-2 gap-3"
      ></div>
    </section>
    <!-- issues modal -->
    <dialog id="issueModal" class="modal">
      <div class="modal-box max-w-xl bg-base-100 rounded-md p-6">
        <h3 id="modalTitle" class="text-2xl font-bold text-neutral mb-2"></h3>

        <div class="flex flex-wrap items-center gap-3 mb-4 text-sm">
          <div id="modalStatusBadge" class="badge text-white px-3 py-1"></div>

          <div class="text-[#64748B] flex flex-wrap items-center gap-2">
            <span>• Opened by <span id="modalAuthor"></span></span>
            <span>•</span>
            <span id="modalDate"></span>
          </div>
        </div>

        <div id="modalMarks" class="flex flex-wrap gap-2 mb-5"></div>

        <div class="prose prose-sm max-w-none mb-6">
          <p id="modalDescription" class="whitespace-pre-wrap"></p>
        </div>

        <div
          class="flex items-start gap-20 pt-4 mt-4 border-t border-[#e5e7ebbb] bg-[#64748b38] rounded-sm p-2"
        >
          <div  class="min-w-[180px]">
            <p class="text-sm text-[#64748B] mb-1">Assignee:</p>
            <p id="modalAssignee" class="font-semibold"></p>
          </div>
          <div  class="min-w-[180px]">
            <p class="text-sm text-[#64748B] mb-1">Priority:</p>
            <p id="modalPriority" class="font-semibold"></p>
          </div>
        </div>

        <div class="mt-6 text-right">
          <form method="dialog">
            <button class="btn btn-primary">Close</button>
          </form>
        </div>
      </div>

      <form method="dialog" class="modal-backdrop">
        <button>close</button>
      </form>
    </dialog>

    <!-- Loading spinner -->
    <div
      id="loadingSpinner"
      class="fixed inset-0 bg-black/45 hidden items-center justify-center z-50"
    >
      <span class="loading loading-spinner loading-lg"></span>
    </div>
    <script src="./javaScript/home.js"></script>
  </body>
</html>
