<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Git hub Tracker</title>
    <!-- Daisy/css -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <!-- css -->
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <main
      id="loginPage"
      class="min-h-screen flex items-center justify-center px-5 bg-base-300"
    >
      <section
        class="max-w-[520px] w-full bg-base-100 rounded-md shadow-sm border border-slate-200 p-7"
      >
        <div class="text-center">
          <div class="flex justify-center mb-5">
            <img
              src="./assets/github-logo.png"
              alt="github-logo"
              class="w-18 h-18 object-contain"
            />
          </div>
          <h2 class="text-neutral font-bold text-2xl">GitHub Issues Tracker</h2>
          <p class="text-[#64748B] text-sm mt-2">
            Sign in to manage your issues
          </p>
        </div>
        <form id="loginForm" class="space-y-5 mt-6">
          <div>
            <label class="label text-neutral font-bold text-md mb-2"
              >Username</label
            ><br />
            <input
              id="username"
              type="text"
              class="input input-bordered w-full"
              placeholder="Enter Username"
            />
            <p class="text-primary">Default: admin</p>
          </div>
          <div>
            <label class="label text-neutral font-bold text-md mb-2"
              >Password</label
            ><br />
            <input
              id="password"
              type="password"
              class="input input-bordered w-full"
              placeholder="Enter Password"
            />
            <p class="text-primary">Default: admin123</p>
          </div>

          <button class="btn btn-primary w-full mt-2">Sign In</button>
        </form>
        <div class="mt-5">
          <div class="flex items-center gap-3">
            <div class="h-px flex-1 bg-slate-300"></div>
            <span class="text-md font-normal text-neutral leading-none"
              >OR</span
            >
            <div class="h-px flex-1 bg-slate-300"></div>
          </div>
          <p class="text-center text-sm text-[#64748B] mt-5 mb-3">
            Demo Credentials:
          </p>
          <div class="text-center bg-[#64748b20] rounded-2xl px-5 py-6">
            <p class="text-sm text-neutral leading-9">
              <span class="font-bold">Username:</span>
              admin
            </p>
            <p class="text-sm text-neutral leading-9">
              <span class="font-bold">Password:</span>
              admin123
            </p>
          </div>
        </div>
      </section>
    </main>
    <script src="./javaScript/first.js"></script>
  </body>
</html>
